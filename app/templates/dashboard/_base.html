{% extends "base.html" %}

{% block topbar %}
<div class="topbar">
  <a href="{{ url_for('dashboard.today') }}" class="topbar-brand">{{ APP_NAME }}</a>
  <nav class="row">
    <a href="{{ url_for('public.trade_page', slug=current_user.slug) }}" target="_blank" rel="noopener" title="View your public booking page">
      View page
    </a>
    <form method="post" action="{{ url_for('auth.logout') }}" style="display:inline;">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <button type="submit" class="btn btn-ghost" style="padding:4px 10px; min-height:30px;">Sign out</button>
    </form>
  </nav>
</div>
{% endblock %}

{% block footer %}
<nav class="bottom-nav">
  <a href="{{ url_for('dashboard.today') }}" class="{% if active_tab == 'today' %}active{% endif %}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Today
  </a>
  <a href="{{ url_for('dashboard.week') }}" class="{% if active_tab == 'week' %}active{% endif %}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Week
  </a>
  <a href="{{ url_for('invoices.index') }}" class="{% if active_tab == 'invoices' %}active{% endif %}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>
    Invoices
  </a>
  <a href="{{ url_for('dashboard.profile') }}" class="{% if active_tab in ['profile', 'availability', 'services', 'more'] %}active{% endif %}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662"/></svg>
    More
  </a>
</nav>
{% endblock %}
