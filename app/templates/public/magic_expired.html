{% extends "base.html" %}
{% block title %}Link expired{% endblock %}
{% block content %}
<div class="success-hero">
  <div class="success-circle" style="background: var(--red);">×</div>
  <h1 class="mt-3">Link expired</h1>
  <p class="muted">Manage links last 24 hours. Request a new one.</p>
</div>

<div class="stack mt-3">
  <a href="{{ url_for('public.lost_reference') }}" class="btn btn-primary btn-block">Send a new link</a>
  <a href="{{ url_for('public.find_booking') }}" class="btn btn-secondary btn-block">I have my reference</a>
</div>
{% endblock %}
