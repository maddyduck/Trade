name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint + Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: sorted_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      FLASK_ENV: testing
      SECRET_KEY: ci-test-secret-not-for-prod-use
      DATABASE_URL: postgresql://postgres:ci@localhost:5432/sorted_test
      APP_BASE_URL: http://localhost:5000
      MAIL_BACKEND: memory
      STRIPE_SECRET_KEY: sk_test_ci_dummy
      STRIPE_PUBLISHABLE_KEY: pk_test_ci_dummy
      STRIPE_WEBHOOK_SECRET: whsec_ci_dummy

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check app tests

      - name: Run tests
        run: pytest -x -v
